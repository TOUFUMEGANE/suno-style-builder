<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Style Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================
     MODERN MINIMAL STYLE (RENEWAL)
     ========================================== */

  :root {
    --bg: #F8F9FA;
    --surface: #FFFFFF;
    --surface2: #EDF2F7;
    --border: #E2E8F0;
    --accent: #4A5568;
    --accent2: #3182CE;
    --accent3: #ECC94B;
    --text: #2D3748;
    --text-dim: #718096;
    --high: #276749;
    --mid: #2B6CB0;
    --low: #C05621;
    --tag-bg: #EDF2F7;
    --tag-selected: rgba(49,130,206,0.08);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    letter-spacing: 0.03em;
  }

  body::before { display: none; }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #1A202C;
    text-shadow: none;
  }

  .logo-sub {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* ===== エリア① プロンプト出力 ===== */
  .output-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
  }

  .output-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .output-text {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    color: var(--text);
    min-height: 48px;
    line-height: 1.7;
    word-break: break-all;
    font-weight: 500;
  }

  .output-text.empty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 13px;
    font-family: inherit;
    font-weight: 400;
  }

  /* 文字数バー */
  .char-bar-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .char-bar-bg {
    flex: 1;
    height: 4px;
    background: #EDF2F7;
    border-radius: 2px;
    overflow: hidden;
  }

  .char-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: #3182CE;
    transition: width 0.3s ease, background 0.3s ease;
    width: 0%;
  }

  .char-bar-fill.warn { background: #D69E2E; }
  .char-bar-fill.over { background: #E53E3E; }

  .char-count {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 56px;
    text-align: right;
  }

  .char-count.warn { color: #D69E2E; }
  .char-count.over { color: #E53E3E; }

  /* コピーボタン */
  .copy-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: #4A5568;
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: #2D3748; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,85,104,0.25); }
  .copy-btn:active { transform: translateY(0); }
  .copy-btn:disabled { background: #CBD5E0; color: #A0AEC0; cursor: default; transform: none; box-shadow: none; }
  .copy-btn.copied { background: #276749; }

  /* ===== エリア② 単語選択パネル ===== */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
  }

  /* 検索 */
  .search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-icon { color: var(--text-dim); font-size: 14px; flex-shrink: 0; }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }

  .search-input::placeholder { color: var(--text-dim); font-size: 12px; }

  /* タブ */
  .tabs {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: #3182CE; border-bottom-color: #3182CE; }

  /* 単語グリッド */
  .words-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    padding: 14px;
    max-height: 320px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .word-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 5px;
    text-align: left;
  }

  .word-btn:hover { border-color: #A0AEC0; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .word-btn.selected {
    background: rgba(49,130,206,0.06);
    border-color: #3182CE;
  }

  .word-name {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }

  .word-jp { font-size: 10px; color: var(--text-dim); }

  /* 打率バッジ */
  .rate-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    border-radius: 3px;
    font-family: "JetBrains Mono", monospace;
  }

  .rate-high { background: rgba(39,103,73,0.08); color: #276749; }
  .rate-mid  { background: rgba(43,108,176,0.08); color: #2B6CB0; }
  .rate-low  { background: rgba(192,86,33,0.08);  color: #C05621; }

  .rate-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .rate-high .rate-dot { background: #276749; }
  .rate-mid  .rate-dot { background: #2B6CB0; }
  .rate-low  .rate-dot { background: #C05621; }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 24px;
  }

  /* ===== エリア③ 選択済みタグ ===== */
  .selected-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
  }

  .selected-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .selected-count {
    background: #ECC94B;
    color: #744210;
    border-radius: 10px;
    font-size: 9px;
    padding: 1px 7px;
    font-weight: 700;
  }

  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    min-height: 32px;
    align-items: flex-start;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #EDF2F7;
    border: none;
    border-radius: 4px;
    padding: 5px 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: #2B6CB0;
    font-weight: 500;
    animation: tagIn 0.15s ease;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .tag-remove {
    background: none;
    border: none;
    color: #A0AEC0;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  .tag-remove:hover { color: #E53E3E; }

  .tags-empty { color: var(--text-dim); font-size: 12px; font-style: italic; }

  .clear-all-btn {
    background: none;
    border: 1px solid #CBD5E0;
    color: var(--text-dim);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    margin-left: auto;
  }

  .clear-all-btn:hover { border-color: #E53E3E; color: #E53E3E; }

  .selected-label-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  /* トースト通知 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1A202C;
    color: #FFFFFF;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    pointer-events: none;
    letter-spacing: 0.05em;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* おすすめセット */
  .suggest-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
  }

  .suggest-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 14px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .suggest-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .suggest-scroll {
    display: flex;
    gap: 10px;
    padding: 10px 14px 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .suggest-scroll::-webkit-scrollbar { display: none; }

  .suggest-card {
    flex-shrink: 0;
    width: 200px;
    background: #F8F9FA;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .suggest-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #3182CE, #63B3ED);
  }

  .suggest-card:hover {
    border-color: #3182CE;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(49,130,206,0.12);
  }

  .suggest-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
    font-family: inherit;
  }

  .suggest-artist {
    font-size: 10px;
    color: #3182CE;
    font-family: "JetBrains Mono", monospace;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .suggest-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .suggest-tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    background: rgba(49,130,206,0.06);
    color: #2B6CB0;
    border: 1px solid rgba(49,130,206,0.15);
    border-radius: 3px;
    padding: 2px 5px;
  }

  .suggest-apply-btn {
    width: 100%;
    padding: 6px;
    background: #EDF2F7;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    color: #2B6CB0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .suggest-apply-btn:hover { background: #BEE3F8; border-color: #3182CE; }

  .suggest-none {
    color: var(--text-dim);
    font-size: 12px;
    padding: 12px 14px;
    font-style: italic;
  }

  /* 検索モード切替 */
  .search-mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .search-mode-tab {
    flex: 1;
    padding: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .search-mode-tab.active { color: #3182CE; border-bottom-color: #3182CE; }

  /* レスポンシブ */
  @media (max-width: 400px) {
    .words-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .logo { font-size: 17px; }
    .suggest-card { width: 175px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">SUNO STYLE BUILDER</div>
    <div class="logo-sub">[ ROCK &amp; JAZZ EDITION ]</div>

  </header>

  <!-- エリア① 出力 -->
  <div class="output-area">
    <div class="output-label">▸ STYLE PROMPT OUTPUT</div>
    <div class="output-text empty" id="outputText">単語をタップして選んでください...</div>
    <div class="char-bar-wrap">
      <div class="char-bar-bg">
        <div class="char-bar-fill" id="charBarFill"></div>
      </div>
      <div class="char-count" id="charCount">0 / 120</div>
    </div>
    <button class="copy-btn" id="copyBtn" disabled onclick="copyPrompt()">📋 ワンタップでコピー</button>
  </div>

  <!-- エリア③ 選択済みタグ（上に配置） -->
  <div class="selected-area">
    <div class="selected-label-row">
      <div class="selected-label">
        ▸ SELECTED
        <span class="selected-count" id="selectedCount">0</span>
      </div>
      <button class="clear-all-btn" id="clearAllBtn" onclick="clearAll()">すべてクリア</button>
    </div>
    <div class="tags-wrap" id="tagsWrap">
      <span class="tags-empty" id="tagsEmpty">まだ何も選択されていません</span>
    </div>
  </div>

  <!-- おすすめセットエリア -->
  <div class="suggest-area" id="suggestArea">
    <div class="suggest-label">✦ IMAGE SEARCH — おすすめセット</div>
    <div class="suggest-scroll" id="suggestScroll">
      <div class="suggest-none">下の検索ボックスで日本語のイメージやアーティスト名を入力してください</div>
    </div>
  </div>

  <!-- エリア② 単語選択 -->
  <div class="panel">
    <div class="search-mode-tabs">
      <button class="search-mode-tab active" id="modeWordBtn" onclick="setSearchMode('word')">🔤 単語検索</button>
      <button class="search-mode-tab" id="modeImageBtn" onclick="setSearchMode('image')">🎨 イメージ検索</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput"
        placeholder="キーワードで検索（例：bass、dark、female...）"
        oninput="onSearchInput()">
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="words-grid" id="wordsGrid"></div>
  </div>
</div>

<div class="toast" id="toast">✓ コピーしました！</div>

<script>

// =============================================
//  検索モード管理
// =============================================
let searchMode = 'word'; // 'word' | 'image'

function setSearchMode(mode) {
  searchMode = mode;
  document.getElementById('modeWordBtn').classList.toggle('active', mode === 'word');
  document.getElementById('modeImageBtn').classList.toggle('active', mode === 'image');

  const input = document.getElementById('searchInput');
  if (mode === 'word') {
    input.placeholder = 'キーワードで検索（例：bass、dark、female...）';
  } else {
    input.placeholder = 'イメージやアーティスト名で検索（例：激しいロック、YOASOBI風...）';
  }

  input.value = '';
  searchQuery = '';
  renderWords();
  renderSuggests([]);
}

function onSearchInput() {
  const raw = document.getElementById('searchInput').value;
  const q = raw.toLowerCase().trim();
  searchQuery = q;

  if (searchMode === 'image') {
    const matched = matchPresets(raw.trim());
    renderSuggests(matched);
    // イメージ検索モード中は単語グリッドを非表示
    document.getElementById('tabs').style.display = 'none';
    document.getElementById('wordsGrid').style.display = q ? 'none' : 'grid';
  } else {
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('wordsGrid').style.display = 'grid';
    renderWords();
    renderSuggests([]);
  }
}

// キーワードマッチング
function matchPresets(query) {
  if (!query) return [];
  const q = query.toLowerCase();
  const scored = PRESETS.map(p => {
    let score = 0;
    p.keywords.forEach(kw => {
      if (q.includes(kw.toLowerCase()) || kw.toLowerCase().includes(q)) score += 2;
    });
    if (p.artist && q.includes(p.artist.toLowerCase())) score += 5;
    if (p.title.toLowerCase().includes(q)) score += 3;
    return { ...p, score };
  }).filter(p => p.score > 0);
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 6);
}

        : '下の検索ボックスで日本語のイメージやアーティスト名を入力してください'
    }</div>`;
    return;
  }

  scroll.innerHTML = presets.map((p, i) => {
    const tagsHtml = p.words.map(w =>
      `<span class="suggest-tag">${w}</span>`
    ).join('');
    const totalLen = p.words.join(', ').length;
    return `
      <div class="suggest-card" id="scard-${i}">
        <div class="suggest-title">${p.title}</div>
        ${p.artist ? `<div class="suggest-artist">🎤 ${p.artist}</div>` : ''}
        <div class="suggest-tags">${tagsHtml}</div>
        <button class="suggest-apply-btn" onclick="applyPreset(${i})">
          ▸ このセットを適用 (${totalLen}文字)
        </button>
      </div>
    `;
  }).join('');
}

// セット適用
function applyPreset(idx) {
  const preset = currentSuggests[idx];
  if (!preset) return;
  let added = 0;
  preset.words.forEach(w => {
    if (!selected.has(w)) {
      const current = [...selected, w].join(', ');
      if (current.length <= 200) {
        selected.add(w);
        added++;
      }
    }
  });
  updateOutput();
  renderWords();
  renderTags();
  showToast(added > 0 ? `✓ ${added}個の単語を追加しました！` : '⚠ すでに追加済みか文字数制限に達しています');
}



// =============================================
//  状態管理
// =============================================
let selected = new Set();
let activeTab = CATEGORIES[0].id;
let searchQuery = '';
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = CATEGORIES.map(cat => `
    <button class="tab ${cat.id === activeTab ? 'active' : ''}"
      onclick="switchTab('${cat.id}')">
      ${cat.label}
    </button>
  `).join('');
}

function switchTab(id) {
  activeTab = id;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderTabs();
  renderWords();
}

// =============================================
//  単語グリッド描画
// =============================================
function renderWords() {
  const grid = document.getElementById('wordsGrid');
  let words = [];

  if (searchQuery) {
    // 全カテゴリから検索
    CATEGORIES.forEach(cat => {
      cat.words.forEach(w => {
        if (
          w.en.toLowerCase().includes(searchQuery) ||
          w.jp.includes(searchQuery)
        ) words.push(w);
      });
    });
    // 重複排除
    const seen = new Set();
    words = words.filter(w => {
      if (seen.has(w.en)) return false;
      seen.add(w.en);
      return true;
    });
  } else {
    const cat = CATEGORIES.find(c => c.id === activeTab);
    words = cat ? cat.words : [];
  }

  if (words.length === 0) {
    grid.innerHTML = '<div class="no-results">「' + searchQuery + '」の検索結果なし</div>';
    return;
  }

  grid.innerHTML = words.map(w => {
    const isSel = selected.has(w.en);
    const rateLabel = { high: 'HIGH', mid: 'MID', low: 'LOW' }[w.rate];
    return `
      <button class="word-btn ${isSel ? 'selected' : ''}"
        onclick="toggleWord('${w.en.replace(/'/g,"\\'")}')">
        <span class="word-name">${w.en}</span>
        <span class="word-jp">${w.jp}</span>
        <span class="rate-badge rate-${w.rate}">
          <span class="rate-dot"></span>${rateLabel}
        </span>
      </button>
    `;
  }).join('');
}

// =============================================
//  単語トグル
// =============================================
function toggleWord(en) {
  if (selected.has(en)) {
    selected.delete(en);
  } else {
    const current = [...selected].join(', ');
    const next = current ? current + ', ' + en : en;
    if (next.length > 200) {
      showToast('⚠ 200文字を超えます！');
      return;
    }
    selected.add(en);
  }
  updateOutput();
  renderWords();
  renderTags();
}

// =============================================
//  出力更新
// =============================================
function updateOutput() {
  const outputEl = document.getElementById('outputText');
  const prompt = [...selected].join(', ');

  if (prompt === '') {
    outputEl.textContent = '単語をタップして選んでください...';
    outputEl.classList.add('empty');
  } else {
    outputEl.textContent = prompt;
    outputEl.classList.remove('empty');
  }

  // 文字数バー
  const len = prompt.length;
  const pct = Math.min((len / 200) * 100, 100);
  const fill = document.getElementById('charBarFill');
  const count = document.getElementById('charCount');

  fill.style.width = pct + '%';
  fill.className = 'char-bar-fill' + (len > 180 ? ' over' : len > 150 ? ' warn' : '');
  count.textContent = len + ' / 200';
  count.className = 'char-count' + (len > 180 ? ' over' : len > 150 ? ' warn' : '');

  // コピーボタン
  const btn = document.getElementById('copyBtn');
  btn.disabled = (prompt === '');
}

// =============================================
//  タグ描画
// =============================================
function renderTags() {
  const wrap = document.getElementById('tagsWrap');
  const empty = document.getElementById('tagsEmpty');
  const countEl = document.getElementById('selectedCount');

  countEl.textContent = selected.size;

  if (selected.size === 0) {
    wrap.innerHTML = '<span class="tags-empty" id="tagsEmpty">まだ何も選択されていません</span>';
    return;
  }

  wrap.innerHTML = [...selected].map(en => `
    <span class="tag">
      ${en}
      <button class="tag-remove" onclick="removeTag('${en.replace(/'/g,"\\'")}')">×</button>
    </span>
  `).join('');
}

function removeTag(en) {
  selected.delete(en);
  updateOutput();
  renderWords();
  renderTags();
}

function clearAll() {
  if (selected.size === 0) return;
  selected.clear();
  updateOutput();
  renderWords();
  renderTags();
}

// =============================================
//  検索フィルタ（単語検索モード用）
// =============================================
function filterWords() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  renderWords();
}

// =============================================
//  コピー
// =============================================
function copyPrompt() {
  const prompt = [...selected].join(', ');
  if (!prompt) return;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✓ コピー完了！';
    showToast('✓ クリップボードにコピーしました！');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 ワンタップでコピー';
    }, 2000);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement('textarea');
    ta.value = prompt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ コピーしました！');
  });
}

// =============================================
//  トースト
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// =============================================
//  初期化
// =============================================
renderTabs();
renderWords();
renderTags();
updateOutput();
renderSuggests([]);
</script>
</body>
</html>
